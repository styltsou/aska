name: CI and deploy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aska
      BETTER_AUTH_SECRET: 01234567890123456789012345678901
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Client
            directory: client
            command: bun run lint && bun run typecheck && bun run format && bun run test && bun run build
          - name: Server
            directory: server
            command: bun run lint && bun run typecheck && bun run format && bun run test
          - name: Image pipeline
            directory: services/image-pipeline
            command: bun run lint && bun run typecheck && bun run format && bun run test
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.command }}
      - if: matrix.name == 'Server'
        run: bun run db:generate && git diff --exit-code

  deploy-dev:
    name: Deploy AWS dev
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: aska-dev-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install SST
        run: bun install --frozen-lockfile
      - name: Install application dependencies
        run: |
          bun install --frozen-lockfile --cwd client
          bun install --frozen-lockfile --cwd server
          bun install --frozen-lockfile --cwd services/image-pipeline
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::089972278413:role/aska-github-actions-deploy
          role-session-name: aska-github-actions-deploy
      - name: Deploy SST dev stage
        run: bunx sst deploy --stage dev
